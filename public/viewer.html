<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
    model-viewer {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      background-color: transparent;
      --poster-color: transparent;
    }
    model-viewer::part(default-progress-bar) { display: none; }

    .wire {
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 30%;
      background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%);
      transform: translateX(-50%);
      z-index: 10;
    }

    /* Soft colored light cast AROUND the ball (sits behind it).
       Kept well inside the frame so it never clips on the container edges. */
    .glow {
      position: absolute;
      inset: 8%;
      z-index: 1;
      pointer-events: none;
      filter: blur(55px);
    }
    .glow span {
      position: absolute;
      width: 40%;
      height: 40%;
      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0;
    }
    .g-pink   { top: 12%; left: 14%; background: radial-gradient(circle, rgba(255,80,180,1), transparent 68%); animation: gl1 6.5s ease-in-out infinite; }
    .g-blue   { bottom: 14%; left: 18%; background: radial-gradient(circle, rgba(70,160,255,1), transparent 68%); animation: gl2 5.3s ease-in-out infinite; }
    .g-purple { bottom: 16%; right: 14%; background: radial-gradient(circle, rgba(180,100,255,1), transparent 68%); animation: gl3 7.4s ease-in-out infinite; }
    .g-yellow { top: 14%; right: 18%; background: radial-gradient(circle, rgba(255,235,70,1), transparent 68%); animation: gl4 4.8s ease-in-out infinite; }
    .g-green  { top: 40%; left: 38%; background: radial-gradient(circle, rgba(90,255,170,1), transparent 68%); animation: gl5 8.1s ease-in-out infinite; }

    /* each fades in and out on its own cycle so only a couple show at a time */
    @keyframes gl1 { 0%,100% { opacity: 0; transform: translate(0,0); } 30% { opacity: 0.85; transform: translate(-5%,-3%); } 60% { opacity: 0; } }
    @keyframes gl2 { 0%,100% { opacity: 0.1; transform: translate(0,0); } 45% { opacity: 0.9; transform: translate(6%,4%); } 80% { opacity: 0; } }
    @keyframes gl3 { 0%,100% { opacity: 0; transform: translate(0,0); } 35% { opacity: 0; } 65% { opacity: 0.85; transform: translate(-6%,3%); } }
    @keyframes gl4 { 0%,100% { opacity: 0.15; transform: translate(0,0); } 50% { opacity: 0.8; transform: translate(4%,-4%); } }
    @keyframes gl5 { 0%,100% { opacity: 0; transform: translate(0,0); } 55% { opacity: 0.6; transform: translate(3%,4%); } }
  </style>
</head>
<body>
  <div class="wire"></div>

  <!-- Ambient colored light cast around the ball -->
  <div class="glow" id="glow">
    <span class="g-pink"></span>
    <span class="g-yellow"></span>
    <span class="g-blue"></span>
    <span class="g-purple"></span>
    <span class="g-green"></span>
  </div>

  <model-viewer
    id="ball"
    src="/model.glb"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="26deg"
    disable-zoom
    disable-pan
    disable-tap
    interaction-prompt="none"
    shadow-intensity="0"
    exposure="2.0"
    tone-mapping="neutral"
    camera-orbit="0deg 85deg 120%"
    field-of-view="30deg"
  ></model-viewer>

  <script type="module">
    // Reflections that behave like moving-head stage lights: a few bright
    // colored beams sweeping on unpredictable paths, fading on/off so only a
    // couple are lit at once, over a silvery base with chrome highlights.
    // Low-res panorama = fast regeneration = smooth, lively motion.
    const W = 512, H = 256;
    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext("2d");

    // [cx, cy, r, R,G,B, ampX, ampY, speedX, speedY, phaseX, phaseY, baseA, pulseA, pulseSpeed, pulsePhase]
    const spots = [
      // white chrome highlights — keep the mirror-ball shine
      [ 80, 60, 110, 255,255,255, 22,14, 0.45,0.35, 0,1.5, 0.7,0.1, 0.5, 0],
      [300,180, 100, 255,255,255, 22,14, 0.40,0.50, 2,0.5, 0.65,0.1, 0.5, 2],
      [430, 70, 85, 255,255,255, 16,12, 0.5,0.4, 1,3, 0.6,0.1, 0.6, 4],
      // distinct colored glints — medium, bright on the swell, silver shows between
      [ 55, 95, 85, 255,80,180, 70,48, 1.1,0.8, 0.4,1.2, 0.5,0.45, 0.70, 0.0], // pink
      [170, 55, 83, 255,225,60, 75,52, 0.9,1.3, 2.1,0.3, 0.5,0.45, 0.85, 2.0], // yellow
      [255,110, 85, 70,160,255, 80,55, 1.3,0.7, 3.0,2.0, 0.5,0.45, 0.60, 4.0], // blue
      [380, 80, 85, 180,100,255, 72,50, 0.8,1.4, 1.0,0.7, 0.5,0.45, 0.95, 1.0], // purple
      [210,190, 83, 90,255,170, 78,52, 1.4,0.9, 4.6,2.5, 0.5,0.45, 0.78, 3.0], // green
      [375,195, 83, 255,140,50, 82,48, 1.0,1.2, 2.4,1.4, 0.5,0.45, 0.88, 5.0], // orange
    ];

    function drawSpot(x, y, r, R, G, B, a) {
      if (a <= 0.01) return;
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, `rgba(${R},${G},${B},${a})`);
      g.addColorStop(0.45, `rgba(${R},${G},${B},${a * 0.55})`);
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function renderEnv(t) {
      // bright silver base -> reads as a real mirror ball (not flat color)
      const base = ctx.createLinearGradient(0, 0, 0, H);
      base.addColorStop(0, "#c4cadf");
      base.addColorStop(1, "#646c8e");
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, W, H);

      for (const s of spots) {
        const [cx, cy, r, R, G, B, ax, ay, sx, sy, phx, phy, baseA, pulseA, ps, pph] = s;
        const x = cx + ax * Math.sin(t * sx + phx);
        const y = cy + ay * Math.sin(t * sy + phy);
        // pulse: beams swell brighter then ease back (never fully off)
        const pulse = 0.5 + 0.5 * Math.sin(t * ps + pph);
        const a = Math.min(1, baseA + pulseA * pulse);
        drawSpot(x, y, r, R, G, B, a);
        if (x < r) drawSpot(x + W, y, r, R, G, B, a);
        if (x > W - r) drawSpot(x - W, y, r, R, G, B, a);
      }
    }

    const mv = document.getElementById("ball");

    customElements.whenDefined("model-viewer").then(() => {
      let prevUrl = null;
      const start = Date.now();

      const tick = () => {
        const t = (Date.now() - start) / 1000;
        renderEnv(t);
        canvas.toBlob((b) => {
          const url = URL.createObjectURL(b);
          mv.environmentImage = url;
          if (prevUrl) URL.revokeObjectURL(prevUrl);
          prevUrl = url;
        }, "image/png");
      };

      renderEnv(0);
      tick();
      setInterval(tick, 80); // ~12fps, smoother & faster
    });
  </script>
</body>
</html>
